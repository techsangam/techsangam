<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Reports Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }
        
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.1em;
        }
        
        .controls {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        label {
            color: #333;
            font-weight: 600;
        }
        
        input, select {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 10px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
            font-size: 1em;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .stat-card h3 {
            font-size: 1em;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
        }
        
        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .chart-container h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.3em;
        }
        
        .table-container {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
        }
        
        tr:hover {
            background: #e9ecef;
        }
        
        .delete-btn {
            background: #dc3545;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
        }
        
        .delete-btn:hover {
            background: #c82333;
        }
        
        @media (max-width: 768px) {
            .charts {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Purchase Reports Dashboard</h1>
            <p class="subtitle">Track and manage your purchases efficiently</p>
        </header>
        
        <div class="controls">
            <div class="control-group">
                <label>Description:</label>
                <input type="text" id="description" placeholder="Enter purchase description">
            </div>
            <div class="control-group">
                <label>Amount:</label>
                <input type="number" id="amount" placeholder="0.00" step="0.01">
            </div>
            <div class="control-group">
                <label>Category:</label>
                <select id="category">
                    <option value="Office">Office</option>
                    <option value="Travel">Travel</option>
                    <option value="Equipment">Equipment</option>
                    <option value="Software">Software</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <button onclick="addPurchase()">Add Purchase</button>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <h3>Total Purchases</h3>
                <div class="value" id="totalPurchases">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Amount</h3>
                <div class="value" id="totalAmount">$0.00</div>
            </div>
            <div class="stat-card">
                <h3>Average Purchase</h3>
                <div class="value" id="averagePurchase">$0.00</div>
            </div>
        </div>
        
        <div class="charts">
            <div class="chart-container">
                <h3>Spending by Category</h3>
                <canvas id="categoryChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>Purchase Trends</h3>
                <canvas id="trendsChart"></canvas>
            </div>
        </div>
        
        <div class="table-container">
            <h3 style="margin-bottom: 15px; color: #333;">Recent Purchases</h3>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="purchaseTable">
                    <!-- Purchases will be added here -->
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        let purchases = JSON.parse(localStorage.getItem('purchases')) || [];
        let categoryChart, trendsChart;
        
        function addPurchase() {
            const description = document.getElementById('description').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const category = document.getElementById('category').value;
            
            if (!description || !amount || amount <= 0) {
                alert('Please fill in all fields with valid data');
                return;
            }
            
            const purchase = {
                id: Date.now(),
                date: new Date().toLocaleDateString(),
                description,
                amount,
                category
            };
            
            purchases.push(purchase);
            localStorage.setItem('purchases', JSON.stringify(purchases));
            
            document.getElementById('description').value = '';
            document.getElementById('amount').value = '';
            
            updateDashboard();
        }
        
        function deletePurchase(id) {
            purchases = purchases.filter(p => p.id !== id);
            localStorage.setItem('purchases', JSON.stringify(purchases));
            updateDashboard();
        }
        
        function updateDashboard() {
            updateStats();
            updateTable();
            updateCharts();
        }
        
        function updateStats() {
            const total = purchases.reduce((sum, p) => sum + p.amount, 0);
            const count = purchases.length;
            const average = count > 0 ? total / count : 0;
            
            document.getElementById('totalPurchases').textContent = count;
            document.getElementById('totalAmount').textContent = '$' + total.toFixed(2);
            document.getElementById('averagePurchase').textContent = '$' + average.toFixed(2);
        }
        
        function updateTable() {
            const tbody = document.getElementById('purchaseTable');
            tbody.innerHTML = '';
            
            purchases.slice().reverse().forEach(purchase => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${purchase.date}</td>
                    <td>${purchase.description}</td>
                    <td>${purchase.category}</td>
                    <td>$${purchase.amount.toFixed(2)}</td>
                    <td><button class="delete-btn" onclick="deletePurchase(${purchase.id})">Delete</button></td>
                `;
            });
        }
        
        function updateCharts() {
            updateCategoryChart();
            updateTrendsChart();
        }
        
        function updateCategoryChart() {
            const categories = {};
            purchases.forEach(p => {
                categories[p.category] = (categories[p.category] || 0) + p.amount;
            });
            
            const ctx = document.getElementById('categoryChart').getContext('2d');
            
            if (categoryChart) {
                categoryChart.destroy();
            }
            
            categoryChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(categories),
                    datasets: [{
                        data: Object.values(categories),
                        backgroundColor: [
                            '#667eea',
                            '#764ba2',
                            '#f093fb',
                            '#4facfe',
                            '#00f2fe'
                        ],
                        borderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }
        
        function updateTrendsChart() {
            const dateGroups = {};
            purchases.forEach(p => {
                dateGroups[p.date] = (dateGroups[p.date] || 0) + p.amount;
            });
            
            const sortedDates = Object.keys(dateGroups).sort();
            const ctx = document.getElementById('trendsChart').getContext('2d');
            
            if (trendsChart) {
                trendsChart.destroy();
            }
            
            trendsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sortedDates,
                    datasets: [{
                        label: 'Daily Spending',
                        data: sortedDates.map(d => dateGroups[d]),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#667eea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2,
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: true
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Amount ($)'
                            }
                        }
                    }
                }
            });
        }
        
        // Initialize on page load
        updateDashboard();
    </script>
</body>
</html>
